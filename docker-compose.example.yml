# Example wiring of the watcher together with Broadcast Box and TeamSpeak on a
# single private network. Copy to docker-compose.yml, fill in the secrets, and
# adjust image tags/ports to taste.

services:
  teamspeak:
    image: teamspeak:latest
    restart: unless-stopped
    environment:
      TS3SERVER_LICENSE: accept
    ports:
      # Voice + query exposed to the host only if you need external access.
      - "9987:9987/udp"
      - "10011:10011"
      - "30033:30033"
    networks:
      - broadcast
    volumes:
      - teamspeak-data:/var/ts3server

  broadcast-box:
    image: seaduboi/broadcast-box:latest
    restart: unless-stopped
    environment:
      # Turn off the public status endpoint; the watcher uses /api/admin/status.
      DISABLE_STATUS: "true"
      # Must match BROADCAST_BOX_ADMIN_TOKEN below (cleartext).
      FRONTEND_ADMIN_TOKEN: "${BROADCAST_BOX_ADMIN_TOKEN}"
    ports:
      - "8080:8080"
      - "3000:3000"
    networks:
      - broadcast

  teamspeak-stream-live:
    # Replace with your GHCR image, e.g. ghcr.io/timche/teamspeak-stream-live:latest
    image: ghcr.io/timche/teamspeak-stream-live:latest
    # Or build locally:
    # build: .
    restart: unless-stopped
    # The watcher's footprint is small; cap it so a single service can't balloon.
    # This also nudges JavaScriptCore to size its heap conservatively.
    mem_limit: 128m
    depends_on:
      - teamspeak
      - broadcast-box
    environment:
      # Broadcast Box feature (omit these to run Twitch only).
      BROADCAST_BOX_API_URL: http://broadcast-box:8080
      BROADCAST_BOX_ADMIN_TOKEN: "${BROADCAST_BOX_ADMIN_TOKEN}"
      PUBLIC_STREAM_HOST: "${PUBLIC_STREAM_HOST}"
      LIVE_GROUP_NAME: "🔴"
      STREAM_GROUP_PREFIX: "📺"
      # Twitch feature (set both to enable; omit to run Broadcast Box only).
      # TWITCH_CLIENT_ID: "${TWITCH_CLIENT_ID}"
      # TWITCH_CLIENT_SECRET: "${TWITCH_CLIENT_SECRET}"
      # TWITCH_LIVE_GROUP_NAME: "🟣"
      # TWITCH_GROUP_PREFIX: "twitch.tv/"
      TEAMSPEAK_HOST: teamspeak
      TEAMSPEAK_QUERY_PORT: "10011"
      TEAMSPEAK_SERVER_PORT: "9987"
      TEAMSPEAK_QUERY_USERNAME: serveradmin
      TEAMSPEAK_QUERY_PASSWORD: "${TEAMSPEAK_QUERY_PASSWORD}"
      TEAMSPEAK_QUERY_NICKNAME: teamspeak-stream-live
      POLL_INTERVAL_MS: "10000"
      LOG_LEVEL: info
    networks:
      - broadcast

networks:
  broadcast:
    driver: bridge

volumes:
  teamspeak-data:
